<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | الطارق للعمرة والزيارة</title>
    <meta name="description" content="الصفحة التي تبحث عنها غير موجودة. عد إلى الصفحة الرئيسية للطارق للعمرة والزيارة.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #0A4A3A;
            --primary-dark: #052E23;
            --primary-light: #E8F2EF;
            --gold: #C9A050;
            --gold-dark: #A07D30;
            --gold-light: #F9F3E2;
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e9ecef;
            --gray-400: #adb5bd;
            --gray-500: #6c757d;
            --gray-600: #495057;
            --gray-700: #343a40;
            --gray-800: #1e1e1e;
            --gray-900: #121212;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--white);
            color: var(--gray-700);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .page-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            background: linear-gradient(180deg, #fafaf8 0%, #f0f5f2 40%, #fff 100%);
            overflow: hidden;
        }

        /* Decorative background circles */
        .bg-decoration {
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
            z-index: 0;
            pointer-events: none;
        }
        .bg-decoration.c1 {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -120px;
            background: var(--primary);
        }
        .bg-decoration.c2 {
            width: 350px;
            height: 350px;
            bottom: -100px;
            left: -80px;
            background: var(--gold);
        }
        .bg-decoration.c3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 10%;
            background: var(--primary);
            opacity: 0.04;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 650px;
            width: 100%;
        }

        /* Logo */
        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 40px;
            transition: transform 0.3s;
        }
        .logo-link:hover {
            transform: translateY(-2px);
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
            text-align: right;
        }
        .logo-text .company-name {
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary-dark);
        }
        .logo-text .company-sub {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--gold-dark);
            letter-spacing: 0.5px;
        }

        /* 404 Number */
        .error-number {
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: clamp(7rem, 15vw, 11rem);
            color: var(--primary);
            line-height: 1;
            margin-bottom: 8px;
            position: relative;
            display: inline-block;
        }
        .error-number .highlight {
            color: var(--gold);
            display: inline-block;
            animation: gentleBounce 2s ease-in-out infinite;
        }
        .error-number .highlight:nth-child(2) {
            animation-delay: 0.2s;
        }
        .error-number .highlight:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes gentleBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-12px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-6px);
            }
            85% {
                transform: translateY(0);
            }
        }

        /* Icon */
        .error-icon {
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 16px;
            display: block;
        }

        /* Text */
        .error-title {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--gray-900);
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 1.1rem;
            color: var(--gray-600);
            margin-bottom: 32px;
            line-height: 1.7;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 8px 20px rgba(10, 74, 58, 0.25);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(10, 74, 58, 0.35);
        }
        .btn-gold {
            background: var(--gold);
            color: #fff;
            box-shadow: 0 8px 20px rgba(201, 160, 80, 0.25);
        }
        .btn-gold:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(201, 160, 80, 0.35);
        }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
            transform: translateY(-2px);
        }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.25);
        }
        .btn-whatsapp:hover {
            background: #1fb855;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(37, 211, 102, 0.35);
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 3px;
            background: var(--gold);
            margin: 0 auto 28px;
            border-radius: 2px;
        }

        /* Footer note */
        .footer-note {
            margin-top: 36px;
            font-size: 0.85rem;
            color: var(--gray-400);
        }
        .footer-note a {
            color: var(--gold-dark);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer-note a:hover {
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .error-number {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .error-message {
                font-size: 0.95rem;
            }
            .btn {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
            .btn-group {
                flex-direction: column;
                align-items: center;
            }
            .btn-group .btn {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Decorative background elements -->
        <div class="bg-decoration c1"></div>
        <div class="bg-decoration c2"></div>
        <div class="bg-decoration c3"></div>

        <div class="content">

                    <path d="M35 62 L50 22 L65 62" fill="none" stroke="#C9A050" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="50" cy="68" r="5" fill="#C9A050"/>

                <div class="logo-text">

            <!-- 404 Number -->
            <div class="error-number">

            <span class="error-icon">🕋</span>

            <!-- Buttons -->
            <div class="btn-group">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> العودة للرئيسية
                </a>
                <a href="https://wa.me/966535584705" class="btn btn-whatsapp" target="_blank" rel="noopener">
                    <i class="fab fa-whatsapp"></i> تواصل واتساب
                </a>
                <a href="tel:0535584705" class="btn btn-outline">
                    <i class="fas fa-phone-alt"></i> اتصل بنا
                </a>

            <!-- Footer note -->
            <p class="footer-note">
                أو استعرض <a href="index.html#packages">باقات العمرة</a> مباشرة
            </p>
        </div>
    </div>
</body>
</html>
